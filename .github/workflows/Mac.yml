name: macOS Remote Desktop
on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-mac-runner

      - name: Install NoMachine
        run: brew install --cask nomachine

      - name: Start NoMachine Server
        run: |
          NX_BIN="/Applications/NoMachine.app/Contents/Frameworks/bin"
          sudo "$NX_BIN/nxserver" --startup || true
          sleep 5

      - name: Set Runner Password
        run: |
          brew install expect
          /usr/bin/expect << 'EOF'
          set timeout 10
          spawn sudo passwd runner
          expect "Old password:"
          send "\r"
          expect "New password:"
          send "rewardoxy123\r"
          expect "Retype new password:"
          send "rewardoxy123\r"
          expect eof
          EOF
          echo "Password set!"

      - name: Disable Sleep
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          sudo caffeinate -dimsu &
          open -a Finder
          sleep 2

      - name: Print Connection Info
        run: |
          echo "================================"
          echo "  IP  : $(tailscale ip -4)"
          echo "  Port: 4000"
          echo "  User: runner"
          echo "  Pass: rewardoxy123"
          echo "================================"

      - name: Keep Alive
        run: sleep 20000
