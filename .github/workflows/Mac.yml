name: macOS Remote Desktop
on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-mac-runner

      - name: Enable SSH Access
        run: |
          # Inject your public key
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys

          # Make sure SSH daemon is running
          sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist || true
          sleep 2
          echo "SSH ready!"

      - name: Disable Sleep
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          sudo caffeinate -dimsu &

      - name: Print Connection Info
        run: |
          echo "================================"
          echo "  SSH: ssh runner@$(tailscale ip -4)"
          echo "================================"

      - name: Keep Alive
        run: sleep 20000
