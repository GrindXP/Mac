name: macOS Remote Desktop
on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-mac-runner

      - name: Enable SSH Access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys
          sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
          sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist
          sleep 2
          echo "SSH ready!"

      - name: Boot iOS Simulator
        run: |
          xcrun simctl boot "iPhone 16" 2>/dev/null || \
          xcrun simctl boot "iPhone 15" 2>/dev/null || true
          open -a Simulator
          sleep 15
          echo "Simulator booted!"

      - name: Start agent-simulator (Browser UI)
        run: |
          git clone https://github.com/jasonkneen/agent-simulator
          cd agent-simulator
          npm install
          npm start -- --port 9100 &
          sleep 10
          echo "Browser UI ready on port 9100"

      - name: Disable Sleep
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          sudo caffeinate -dimsu &

      - name: Print Connection Info
        run: |
          TAILSCALE_IP=$(tailscale ip -4)
          echo "================================"
          echo "  SSH: ssh runner@${TAILSCALE_IP}"
          echo ""
          echo "  iOS Browser UI tunnel:"
          echo "  ssh -i C:/Users/DELL/.ssh/sshgithubmac -L 9100:localhost:9100 -N runner@${TAILSCALE_IP}"
          echo "  Then open: http://localhost:9100"
          echo "================================"

      - name: Keep Alive
        run: sleep 20000
