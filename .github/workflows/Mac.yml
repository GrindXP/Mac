name: macOS Remote Desktop
on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-mac-runner

      - name: Disable Sleep & Keep Awake
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0 hibernatemode 0
          sudo caffeinate -dimsu &
          open -a Finder
          sleep 2

      - name: Enable VNC Screen Sharing (own password, no system auth!)
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -allowAccessFor -allUsers \
            -privs -all \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw rewardoxy123 \
            -restart -agent -privs -all
          echo "VNC ready: $?"
          sleep 3

      - name: Print Connection Info
        run: |
          echo "================================"
          echo "  IP  : $(tailscale ip -4)"
          echo "  Port: 5900 (VNC)"
          echo "  Pass: rewardoxy123"
          echo "================================"

      - name: Keep Alive
        run: sleep 20000
