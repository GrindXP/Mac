name: macOS Remote Desktop
on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-mac-runner

      - name: Install NoMachine Server
        run: |
          # Download NoMachine for Apple Silicon (ARM64)
          curl -L "https://download.nomachine.com/download/8.15/Mac/nomachine_8.15.3_1_arm64.pkg" \
            -o /tmp/nomachine.pkg
          sudo installer -pkg /tmp/nomachine.pkg -target /
          sleep 5
          echo "NoMachine installed!"

      - name: Start NoMachine & Set Password
        run: |
          # Start NX services
          sudo /usr/NX/bin/nxserver --startup
          sleep 3
          # Set runner password for NoMachine login
          printf "rewardoxy123\nrewardoxy123\n" | sudo /usr/NX/bin/nxserver --passwd runner
          echo "NoMachine started!"

      - name: Disable Sleep
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          sudo caffeinate -dimsu &

      - name: Print Connection Info
        run: |
          echo "================================"
          echo "  NOMACHINE CONNECTION"
          echo "  IP  : $(tailscale ip -4)"
          echo "  Port: 4000"
          echo "  User: runner"
          echo "  Pass: rewardoxy123"
          echo "================================"
          echo "Download NoMachine client (Windows):"
          echo "https://download.nomachine.com/download/8.15/Windows/nomachine_8.15.3_3_x86_64.exe"

      - name: Keep Alive
        run: sleep 20000
