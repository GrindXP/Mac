name: macOS Remote Desktop
on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-mac-runner

      - name: Set SSH Password for runner
        run: |
          # Set password for the 'runner' user (macOS uses dscl)
          sudo dscl . -passwd /Users/runner "${{ secrets.SSH_PASSWORD }}"
          echo "Password set for runner user."

      - name: Enable Password Authentication in SSH
        run: |
          # Backup original sshd_config
          sudo cp /etc/ssh/sshd_config /etc/ssh/sshd_config.bak

          # Enable PasswordAuthentication
          sudo sed -i '' 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i '' 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config

          # Also ensure ChallengeResponseAuthentication is enabled (for PAM)
          sudo sed -i '' 's/#ChallengeResponseAuthentication yes/ChallengeResponseAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i '' 's/ChallengeResponseAuthentication no/ChallengeResponseAuthentication yes/' /etc/ssh/sshd_config

          # Make sure UsePAM is on
          sudo sed -i '' 's/#UsePAM yes/UsePAM yes/' /etc/ssh/sshd_config

          # Restart SSH daemon to apply changes
          sudo launchctl stop com.openssh.sshd || true
          sudo launchctl start com.openssh.sshd || true
          sudo launchctl kickstart -k system/com.openssh.sshd || true
          sleep 3
          echo "SSH Password Authentication enabled!"

      - name: Disable Sleep
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          sudo caffeinate -dimsu &

      - name: Print Connection Info
        run: |
          echo "================================"
          echo "  SSH: ssh runner@$(tailscale ip -4)"
          echo "  Password: (your SSH_PASSWORD secret)"
          echo "================================"

      - name: Keep Alive
        run: sleep 20000
