name: macOS Remote Desktop
on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-mac-runner

      - name: Enable SSH Access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys
          sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
          sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist
          sleep 2
          echo "SSH ready!"

      - name: Boot iOS Simulator
        run: |
          xcrun simctl boot "iPhone 16" 2>/dev/null || \
          xcrun simctl boot "iPhone 15" 2>/dev/null || true
          open -a Simulator
          sleep 15
          echo "Simulator booted!"

      - name: Start Screen Stream
        run: |
          mkdir -p /tmp/stream

          # Screenshot loop
          while true; do
            xcrun simctl io booted screenshot /tmp/stream/screen.png 2>/dev/null || \
            screencapture -x -t png /tmp/stream/screen.png 2>/dev/null
            sleep 1
          done &

          # Write HTML + server using Python (avoids YAML << conflict)
          python3 -c "
          html = open('/tmp/stream/index.html','w')
          html.write('<!DOCTYPE html><html><head><title>iOS Simulator</title><style>body{margin:0;background:#111;display:flex;flex-direction:column;align-items:center}img{max-height:95vh;cursor:pointer;margin-top:10px}#s{color:#0f0;font-family:monospace;padding:5px}</style></head><body><div id=\"s\">Live - click to tap</div><img id=\"scr\" src=\"screen.png\"/><script>const i=document.getElementById(\"scr\");setInterval(()=>{i.src=\"screen.png?t=\"+Date.now()},800);i.addEventListener(\"click\",async e=>{const r=i.getBoundingClientRect();const x=Math.round((e.clientX-r.left)*390/r.width);const y=Math.round((e.clientY-r.top)*844/r.height);await fetch(\"/tap?x=\"+x+\"&y=\"+y);document.getElementById(\"s\").textContent=\"Tapped \"+x+\",\"+y;});</script></body></html>')
          html.close()
          "

          python3 -c "
          srv = open('/tmp/stream/server.py','w')
          srv.write('import http.server,urllib.parse,subprocess,os\nclass H(http.server.SimpleHTTPRequestHandler):\n    def do_GET(self):\n        if self.path.startswith(\"/tap\"):\n            q=urllib.parse.parse_qs(urllib.parse.urlparse(self.path).query)\n            x,y=q.get(\"x\",[\"0\"])[0],q.get(\"y\",[\"0\"])[0]\n            subprocess.run([\"xcrun\",\"simctl\",\"io\",\"booted\",\"tap\",x,y])\n            self.send_response(200);self.end_headers()\n        else:super().do_GET()\n    def log_message(self,*a):pass\nos.chdir(\"/tmp/stream\")\nhttp.server.HTTPServer((\"\",9100),H).serve_forever()\n')
          srv.close()
          "

          python3 /tmp/stream/server.py &
          sleep 3
          echo "Stream ready on port 9100"

      - name: Disable Sleep
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          sudo caffeinate -dimsu &

      - name: Print Connection Info
        run: |
          TAILSCALE_IP=$(tailscale ip -4)
          echo "================================"
          echo "  SSH: ssh runner@${TAILSCALE_IP}"
          echo "  Tunnel: ssh -i C:/Users/DELL/.ssh/sshgithubmac -L 9100:localhost:9100 -N runner@${TAILSCALE_IP}"
          echo "  Browser: http://localhost:9100"
          echo "================================"

      - name: Keep Alive
        run: sleep 20000
