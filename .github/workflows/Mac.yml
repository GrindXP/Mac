name: macOS Remote Desktop
on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-mac-runner

      - name: Set SSH Password
        run: |
          # Set password for runner user (change 'your_password' to your desired password)
          echo "runner:your_password" | chpasswd
          
      - name: Enable Password SSH Authentication
        run: |
          # Enable password authentication in SSH config
          sudo sed -i '' 's/#PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i '' 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          # Restart SSH daemon
          sudo launchctl stop com.openssh.sshd
          sudo launchctl start com.openssh.sshd
          sleep 2
          echo "SSH password authentication enabled!"
          
      - name: Enable SSH Access (Keys)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys

      - name: Disable Sleep
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          sudo caffeinate -dimsu &
          
      - name: Print Connection Info
        run: |
          echo "================================"
          echo "  SSH: ssh runner@$(tailscale ip -4)"
          echo "  Password: your_password"
          echo "================================"
          
      - name: Keep Alive
        run: sleep 20000
