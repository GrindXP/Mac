name: macOS Remote Desktop
on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-mac-runner

      - name: Enable SSH with Password Auth
        run: |
          # Set password using sysadminctl (works without old password on GitHub runners)
          sudo sysadminctl -resetPasswordFor runner -newPassword "${{ secrets.SSH_PASSWORD }}"

          # Inject public key (for VS Code key-based login)
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys

          # Enable PasswordAuthentication in sshd_config
          sudo sed -i '' 's/#PasswordAuthentication yes/PasswordAuthentication yes/g' /etc/ssh/sshd_config
          sudo sed -i '' 's/PasswordAuthentication no/PasswordAuthentication yes/g' /etc/ssh/sshd_config
          grep -q "^PasswordAuthentication yes" /etc/ssh/sshd_config || \
            echo "PasswordAuthentication yes" | sudo tee -a /etc/ssh/sshd_config

          # Restart SSH daemon
          sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
          sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist
          sleep 2
          echo "SSH ready!"

      - name: Disable Sleep
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          sudo caffeinate -dimsu &

      - name: Print Connection Info
        run: |
          TAILSCALE_IP=$(tailscale ip -4)
          echo "================================"
          echo "  SSH (password): ssh runner@${TAILSCALE_IP}"
          echo "  Password: your SSH_PASSWORD secret"
          echo "  VS Code: use Host github-mac-runner in .ssh/config"
          echo "================================"

      - name: Keep Alive
        run: sleep 20000
