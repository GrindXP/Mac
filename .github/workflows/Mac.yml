- name: Boot iOS Simulator
  run: |
    xcrun simctl boot "iPhone 16" 2>/dev/null || \
    xcrun simctl boot "iPhone 15" 2>/dev/null || true
    open -a Simulator
    sleep 15

- name: Start Screen Stream (HTTP Screenshot Server)
  run: |
    mkdir -p /tmp/stream

    # Capture screenshot every 1 second into a file
    while true; do
      screencapture -x -t jpg /tmp/stream/screen.jpg 2>/dev/null
      sleep 1
    done &

    # Serve it as a web page with auto-refresh
    cat > /tmp/stream/index.html << 'EOF'
    <html>
    <head>
      <title>iOS Simulator Stream</title>
      <style>body{margin:0;background:#000;display:flex;justify-content:center;}
      img{max-width:100%;height:auto;}</style>
    </head>
    <body>
      <img id="screen" src="screen.jpg"/>
      <script>
        setInterval(() => {
          document.getElementById('screen').src = 'screen.jpg?t=' + Date.now();
        }, 1000);
      </script>
    </body>
    </html>
    EOF

    cd /tmp/stream && python3 -m http.server 9100 &
    sleep 3
    echo "Stream ready on port 9100"
