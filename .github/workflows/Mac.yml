name: macOS Remote Desktop
on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-mac-runner

      - name: Install NoMachine
        run: brew install --cask nomachine

      - name: Start NoMachine Server
        run: |
          NX_BIN="/Applications/NoMachine.app/Contents/Frameworks/bin"
          sudo "$NX_BIN/nxserver" --startup || true
          sleep 3

      - name: Set Root Password (bypasses secure token!)
        run: |
          printf "rewardoxy123\nrewardoxy123\n" | sudo passwd root
          echo "Root password set: $?"

      - name: Enable Root Login for NoMachine
        run: |
          # Allow root login via NX
          NX_CFG="/Applications/NoMachine.app/Contents/Frameworks/etc/server.cfg"
          sudo sed -i '' 's/#EnableRootLogin 1/EnableRootLogin 1/' "$NX_CFG" || true
          echo "EnableRootLogin 1" | sudo tee -a "$NX_CFG"
          sudo /Applications/NoMachine.app/Contents/Frameworks/bin/nxserver --restart || true
          sleep 3

      - name: Disable Sleep
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          sudo caffeinate -dimsu &
          open -a Finder
          sleep 2

      - name: Print Connection Info
        run: |
          echo "================================"
          echo "  IP  : $(tailscale ip -4)"
          echo "  Port: 4000"
          echo "  User: root"
          echo "  Pass: rewardoxy123"
          echo "================================"

      - name: Keep Alive
        run: sleep 20000
