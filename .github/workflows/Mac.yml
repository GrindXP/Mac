name: macOS Remote Desktop
on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-mac-runner

      - name: Install NoMachine via Homebrew
        run: |
          brew install --cask nomachine

      - name: Start NoMachine Server
        run: |
          # NoMachine v9 binary is inside the app bundle on macOS
          NX_BIN="/Applications/NoMachine.app/Contents/Frameworks/bin"
          echo "NX binaries: $(ls $NX_BIN)"
          
          # Start the server
          sudo "$NX_BIN/nxserver" --startup || true
          sleep 5
          sudo "$NX_BIN/nxserver" --status || true

      - name: Disable Sleep & Keep Awake
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          sudo caffeinate -dimsu &
          open -a Finder
          sleep 2

      - name: Print Connection Info
        run: |
          NX_BIN="/Applications/NoMachine.app/Contents/Frameworks/bin"
          echo "================================"
          echo "  NOMACHINE CONNECTION"
          echo "  IP  : $(tailscale ip -4)"
          echo "  Port: 4000"
          echo "  User: runner"
          echo "  Pass: (leave blank)"
          echo "================================"
          sudo "$NX_BIN/nxserver" --status

      - name: Keep Alive
        run: sleep 20000
