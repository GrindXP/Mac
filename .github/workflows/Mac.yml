name: macOS Remote Desktop
on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-mac-runner

      - name: Install NoMachine
        run: brew install --cask nomachine

      - name: Start NoMachine Server
        run: |
          NX_BIN="/Applications/NoMachine.app/Contents/Frameworks/bin"
          sudo "$NX_BIN/nxserver" --startup || true
          sleep 3

      - name: Set Runner Password (empty old password method)
        run: |
          # runner has no password = empty string as old password
          sudo dscl . -passwd /Users/runner "" rewardoxy123
          echo "Runner password set: $?"

      - name: Wake Active Session
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          sudo caffeinate -dimsu &
          open -a Finder
          sleep 2
          osascript -e 'tell application "Finder" to activate'

      - name: Print Connection Info
        run: |
          echo "================================"
          echo "  IP  : $(tailscale ip -4)"
          echo "  Port: 4000"
          echo "  User: runner"
          echo "  Pass: rewardoxy123"
          echo "================================"

      - name: Keep Alive
        run: sleep 20000
