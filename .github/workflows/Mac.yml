name: macOS Remote Desktop
on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-mac-runner

      - name: Install NoMachine via Homebrew
        run: |
          brew install --cask nomachine
          echo "NoMachine installed: $(ls /Applications/ | grep -i nomachine)"

      - name: Start NoMachine Server
        run: |
          sudo /usr/NX/bin/nxserver --startup
          sleep 5
          sudo /usr/NX/bin/nxserver --status

      - name: Disable Sleep
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          sudo caffeinate -dimsu &

      - name: Open Finder to activate GUI
        run: |
          open -a Finder
          sleep 3

      - name: Print Connection Info
        run: |
          TAILSCALE_IP=$(tailscale ip -4)
          echo "================================"
          echo "  NOMACHINE CONNECTION"
          echo "  IP  : $TAILSCALE_IP"
          echo "  Port: 4000"
          echo "  User: runner"
          echo "  Pass: (your Mac runner has no password set)"
          echo "  NOTE: Leave password blank OR set one below"
          echo "================================"
          echo ""
          echo "Download NoMachine for Windows:"
          echo "https://www.nomachine.com/download"

      - name: Keep Alive
        run: sleep 20000
