name: macOS Remote Desktop
on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-mac-runner

      - name: Install NoMachine
        run: brew install --cask nomachine

      - name: Start NoMachine Server
        run: |
          NX_BIN="/Applications/NoMachine.app/Contents/Frameworks/bin"
          sudo "$NX_BIN/nxserver" --startup || true
          sleep 3

      - name: Create New User with Password
        run: |
          # Create a brand new local user (no existing password = no verification needed)
          sudo dscl . -create /Users/macuser
          sudo dscl . -create /Users/macuser UserShell /bin/zsh
          sudo dscl . -create /Users/macuser RealName "Mac User"
          sudo dscl . -create /Users/macuser UniqueID 510
          sudo dscl . -create /Users/macuser PrimaryGroupID 20
          sudo dscl . -create /Users/macuser NFSHomeDirectory /Users/macuser
          sudo mkdir -p /Users/macuser
          sudo chown macuser /Users/macuser
          # Set password on new user (no old password = works fine)
          sudo dscl . -passwd /Users/macuser rewardoxy123
          # Add to admin group
          sudo dscl . -append /Groups/admin GroupMembership macuser
          echo "User created successfully!"
          # Verify
          dscl . -read /Users/macuser UniqueID

      - name: Disable Sleep
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          sudo caffeinate -dimsu &
          open -a Finder
          sleep 2

      - name: Print Connection Info
        run: |
          echo "================================"
          echo "  IP  : $(tailscale ip -4)"
          echo "  Port: 4000"
          echo "  User: macuser"
          echo "  Pass: rewardoxy123"
          echo "================================"

      - name: Keep Alive
        run: sleep 20000
