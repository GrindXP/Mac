name: macOS Remote Desktop
on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-mac-runner

      - name: Disable Sleep
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0 hibernatemode 0
          sudo caffeinate -dimsu &

      - name: Grant Screen Recording Permission to ARDAgent (fix black screen!)
        run: |
          # Inject TCC screen capture permission directly
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
          "INSERT OR REPLACE INTO access \
          (service, client, client_type, auth_value, auth_reason, auth_version, csreq, policy_id, indirect_object_identifier_type, indirect_object_identifier, indirect_object_code_identity, flags, last_modified) \
          VALUES ('kTCCServiceScreenCapture', 'com.apple.RemoteDesktop', 0, 2, 4, 1, NULL, NULL, 0, 'UNUSED', NULL, 0, strftime('%s','now'));"

          # Also grant to screensharingd
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
          "INSERT OR REPLACE INTO access \
          (service, client, client_type, auth_value, auth_reason, auth_version, csreq, policy_id, indirect_object_identifier_type, indirect_object_identifier, indirect_object_code_identity, flags, last_modified) \
          VALUES ('kTCCServiceScreenCapture', 'com.apple.screensharingd', 0, 2, 4, 1, NULL, NULL, 0, 'UNUSED', NULL, 0, strftime('%s','now'));"

          echo "TCC permissions injected!"

      - name: Enable VNC with Password
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -allowAccessFor -allUsers \
            -privs -all \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw rewardoxy123 \
            -restart -agent -privs -all
          sleep 3
          echo "VNC ready!"

      - name: Open Finder to ensure display is active
        run: |
          open -a Finder
          sleep 3

      - name: Print Connection Info
        run: |
          echo "================================"
          echo "  IP  : $(tailscale ip -4)"
          echo "  Port: 5900 (VNC)"
          echo "  Pass: rewardoxy123"
          echo "================================"

      - name: Keep Alive
        run: sleep 20000
